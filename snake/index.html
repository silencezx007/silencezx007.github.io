<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>小兵贪吃蛇·柯基版</title>
  <style>
    :root {
      --bg1: #22112f;
      --bg2: #3b1f53;
      --panel: rgba(28, 16, 41, 0.88);
      --text: #fff7ed;
      --accent: #fb923c;
      --accent2: #fbbf24;
      --danger: #fb7185;
      --grid: rgba(255,255,255,0.07);
      --corgi-main: #d97706;
      --corgi-light: #fde7c6;
      --corgi-dark: #7c2d12;
      --corgi-cheek: #fca5a5;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #7c3aed 0%, var(--bg2) 32%, var(--bg1) 100%);
      display: flex;
      justify-content: center;
      padding: 14px;
    }
    .wrap {
      width: min(100%, 780px);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      border-radius: 26px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.38);
      padding: 16px;
    }
    h1 { margin: 0; font-size: clamp(28px, 6vw, 42px); }
    .subtitle {
      margin-top: 8px;
      color: #f5e9ff;
      font-size: 14px;
      line-height: 1.6;
    }
    .stats {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px;
      padding: 10px 12px;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .card small { display: block; color: #f8e8d8; margin-bottom: 6px; font-size: 12px; }
    .card strong { font-size: 22px; }
    .canvas-wrap { margin-top: 16px; position: relative; }
    canvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        radial-gradient(circle at 50% 20%, #1f1632 0%, #120d1f 80%);
      background-size: 24px 24px, 24px 24px, 100% 100%;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      touch-action: none;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.35);
    }
    .panel {
      margin-top: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    button {
      border: 0;
      border-radius: 18px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      min-height: 52px;
      transition: transform .08s ease, filter .08s ease;
    }
    button:active { transform: scale(0.97); filter: brightness(.95); }
    .primary { background: linear-gradient(180deg, #fdba74, #fb923c); color: #4a1900; }
    .secondary { background: linear-gradient(180deg, #fde68a, #fbbf24); color: #4b3300; }
    .danger { background: linear-gradient(180deg, #fda4af, #fb7185); color: #4c1020; }
    .ctrl-grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 78px);
      grid-template-rows: repeat(3, 64px);
      justify-content: center;
      gap: 8px;
    }
    .ctrl {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      font-size: 26px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .ctrl.dead { opacity: .42; font-size: 14px; line-height: 1.15; }
    .hint { margin-top: 10px; color: #fff1dd; font-size: 14px; line-height: 1.6; }
    .footer { text-align: center; color: #f7dfcf; font-size: 13px; margin-top: 16px; }
    @media (max-width: 460px) {
      .wrap { padding: 12px; border-radius: 18px; }
      .stats { gap: 8px; }
      .card strong { font-size: 20px; }
      .ctrl-grid { grid-template-columns: repeat(3, 68px); grid-template-rows: repeat(3, 58px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐶 小兵贪吃蛇·柯基版</h1>
    <div class="subtitle">这次不是方块蛇了，是柯基风格建模版～头更像小狗，身体更顺，移动也更丝滑。你可以点方向按钮，也可以直接在棋盘上滑动。</div>

    <div class="stats">
      <div class="card"><small>分数</small><strong id="score">0</strong></div>
      <div class="card"><small>最高分</small><strong id="best">0</strong></div>
      <div class="card"><small>状态</small><strong id="status">待开始</strong></div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game" width="540" height="540" aria-label="小兵贪吃蛇柯基版"></canvas>
    </div>

    <div class="panel">
      <strong>操作区</strong>
      <div class="buttons">
        <button class="primary" id="startBtn">开始</button>
        <button class="secondary" id="pauseBtn">暂停/继续</button>
        <button class="danger" id="restartBtn">重开</button>
      </div>

      <div class="ctrl-grid">
        <div></div>
        <button class="ctrl" data-dir="up" aria-label="向上">↑</button>
        <div></div>
        <button class="ctrl" data-dir="left" aria-label="向左">←</button>
        <div class="ctrl dead">柯基<br>鼻尖</div>
        <button class="ctrl" data-dir="right" aria-label="向右">→</button>
        <div></div>
        <button class="ctrl" data-dir="down" aria-label="向下">↓</button>
        <div></div>
      </div>

      <div class="hint" id="message">准备好了就开始吧～柯基已经摇着小尾巴等你了。</div>
      <div class="hint">吃到骨头饼干会加分；撞墙或撞到自己就结束。后面会一点点加速，但动画会保持顺滑。</div>
    </div>

    <div class="footer">做给 Summer 的小游戏 by 小兵 ✨</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const restartBtn = document.getElementById('restartBtn');
    const dirButtons = [...document.querySelectorAll('[data-dir]')];

    const gridSize = 27;
    const tileCount = canvas.width / gridSize;
    const bestKey = 'summer-snake-best-score-corgi';

    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 0, y: 0 };
    let score = 0;
    let moveInterval = 180;
    let running = false;
    let paused = false;
    let started = false;
    let gameOverState = false;
    let accumulator = 0;
    let lastFrameTime = 0;
    let animationProgress = 0;
    let previousSnake = [];
    let touchStartX = null;
    let touchStartY = null;

    function roundRect(x, y, w, h, r) {
      if (ctx.roundRect) {
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
        return;
      }
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function loadBest() {
      const best = Number(localStorage.getItem(bestKey) || 0);
      bestEl.textContent = String(best);
    }

    function saveBest() {
      const best = Number(localStorage.getItem(bestKey) || 0);
      if (score > best) {
        localStorage.setItem(bestKey, String(score));
        bestEl.textContent = String(score);
      }
    }

    function cloneSnake(source) {
      return source.map(part => ({ x: part.x, y: part.y }));
    }

    function resetGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 },
        { x: 7, y: 10 }
      ];
      previousSnake = cloneSnake(snake);
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      moveInterval = 180;
      running = false;
      paused = false;
      started = false;
      gameOverState = false;
      accumulator = 0;
      animationProgress = 0;
      scoreEl.textContent = '0';
      statusEl.textContent = '待开始';
      messageEl.textContent = '准备好了就开始吧～柯基已经摇着小尾巴等你了。';
      placeFood();
      draw(0);
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(part => part.x === food.x && part.y === food.y));
    }

    function startGame() {
      if (running && !paused) return;
      started = true;
      running = true;
      paused = false;
      gameOverState = false;
      statusEl.textContent = '进行中';
      messageEl.textContent = '冲呀～这只柯基跑起来了。';
    }

    function togglePause() {
      if (!started || gameOverState) return;
      paused = !paused;
      running = !paused;
      statusEl.textContent = paused ? '已暂停' : '进行中';
      messageEl.textContent = paused ? '柯基蹲下来歇一下。' : '继续冲！';
    }

    function setDirection(x, y) {
      if (!started) startGame();
      if (gameOverState) return;
      const goingBack = x === -direction.x && y === -direction.y;
      if (goingBack) return;
      nextDirection = { x, y };
    }

    function handleDir(name) {
      if (name === 'up') setDirection(0, -1);
      if (name === 'down') setDirection(0, 1);
      if (name === 'left') setDirection(-1, 0);
      if (name === 'right') setDirection(1, 0);
    }

    function updateGameStep() {
      previousSnake = cloneSnake(snake);
      direction = { ...nextDirection };
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      if (
        head.x < 0 || head.x >= tileCount ||
        head.y < 0 || head.y >= tileCount ||
        snake.some(part => part.x === head.x && part.y === head.y)
      ) {
        gameOver();
        return;
      }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 1;
        scoreEl.textContent = String(score);
        saveBest();
        placeFood();
        messageEl.textContent = score < 5 ? '吃到骨头饼干啦！' : '哇，柯基越跑越顺了！';
        if (moveInterval > 92) moveInterval -= 6;
      } else {
        snake.pop();
      }
      animationProgress = 0;
    }

    function gameOver() {
      running = false;
      paused = false;
      gameOverState = true;
      statusEl.textContent = '结束';
      messageEl.textContent = `这局拿了 ${score} 分。点“重开”再来！`;
      saveBest();
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function getInterpolatedSnake(progress) {
      return snake.map((part, index) => {
        const prev = previousSnake[index] || snake[index + 1] || part;
        return {
          x: lerp(prev.x, part.x, progress),
          y: lerp(prev.y, part.y, progress)
        };
      });
    }

    function drawFood() {
      const x = food.x * gridSize + gridSize / 2;
      const y = food.y * gridSize + gridSize / 2;
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = '#fff7ed';
      roundRect(-9, -5, 18, 10, 5);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-10, 0, 4, 0, Math.PI * 2);
      ctx.arc(10, 0, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f59e0b';
      ctx.beginPath();
      ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawBodyPart(part, index, total) {
      const px = part.x * gridSize + 2.5;
      const py = part.y * gridSize + 2.5;
      const size = gridSize - 5;
      const shade = 0.16 + (index / Math.max(total, 1)) * 0.18;
      ctx.fillStyle = `rgba(217, 119, 6, ${0.92 - shade})`;
      roundRect(px, py, size, size, 11);
      ctx.fill();
      ctx.fillStyle = index % 2 === 0 ? '#fde7c6' : '#f8d6ab';
      roundRect(px + 4, py + size * 0.45, size - 8, size * 0.34, 9);
      ctx.fill();
    }

    function drawTail(part, prevPart, wag) {
      const cx = part.x * gridSize + gridSize / 2;
      const cy = part.y * gridSize + gridSize / 2;
      const angle = Math.atan2(part.y - prevPart.y, part.x - prevPart.x) + Math.PI;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle + wag);
      ctx.fillStyle = '#b45309';
      ctx.beginPath();
      ctx.moveTo(-3, 0);
      ctx.quadraticCurveTo(-10, -4, -15, -1);
      ctx.quadraticCurveTo(-10, 1, -3, 3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawHead(head) {
      const cx = head.x * gridSize + gridSize / 2;
      const cy = head.y * gridSize + gridSize / 2;
      const angle = Math.atan2(direction.y, direction.x);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);

      ctx.fillStyle = '#d97706';
      ctx.beginPath();
      ctx.ellipse(0, 0, 13, 11.5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#7c2d12';
      ctx.beginPath();
      ctx.moveTo(-7, -5);
      ctx.lineTo(-12, -15);
      ctx.lineTo(-2, -10);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-7, 5);
      ctx.lineTo(-12, 15);
      ctx.lineTo(-2, 10);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#fde7c6';
      ctx.beginPath();
      ctx.ellipse(4, 0, 8.5, 7.5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(3.5, -4, 2.4, 0, Math.PI * 2);
      ctx.arc(3.5, 4, 2.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1f2937';
      ctx.beginPath();
      ctx.arc(4.2, -4, 1.15, 0, Math.PI * 2);
      ctx.arc(4.2, 4, 1.15, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#111827';
      ctx.beginPath();
      ctx.arc(10, 0, 1.7, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#7c2d12';
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(10, 0);
      ctx.quadraticCurveTo(7, 1.6, 5, 1.9);
      ctx.moveTo(10, 0);
      ctx.quadraticCurveTo(7, -1.6, 5, -1.9);
      ctx.stroke();

      ctx.fillStyle = '#fca5a5';
      ctx.beginPath();
      ctx.arc(6, -7, 1.6, 0, Math.PI * 2);
      ctx.arc(6, 7, 1.6, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function draw(progress = 0) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawFood();

      const smoothSnake = getInterpolatedSnake(progress);
      smoothSnake.forEach((part, index) => drawBodyPart(part, index, smoothSnake.length));
      if (smoothSnake.length > 1) {
        const tail = smoothSnake[smoothSnake.length - 1];
        const beforeTail = smoothSnake[smoothSnake.length - 2];
        const wag = Math.sin(performance.now() / 120) * 0.28;
        drawTail(tail, beforeTail, wag);
      }
      if (smoothSnake[0]) drawHead(smoothSnake[0]);

      if (!started || gameOverState) {
        ctx.fillStyle = 'rgba(10, 6, 20, 0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff7ed';
        ctx.textAlign = 'center';
        ctx.font = 'bold 34px sans-serif';
        ctx.fillText(gameOverState ? '游戏结束' : '点开始或滑动开局', canvas.width / 2, canvas.height / 2 - 8);
        ctx.font = '18px sans-serif';
        ctx.fillText(gameOverState ? '点重开再来一局' : '方向按钮也能控制', canvas.width / 2, canvas.height / 2 + 28);
      }
    }

    function gameFrame(timestamp) {
      if (!lastFrameTime) lastFrameTime = timestamp;
      const delta = timestamp - lastFrameTime;
      lastFrameTime = timestamp;

      if (running && !paused && !gameOverState) {
        accumulator += delta;
        while (accumulator >= moveInterval) {
          accumulator -= moveInterval;
          updateGameStep();
          if (gameOverState) break;
        }
        animationProgress = Math.min(accumulator / moveInterval, 1);
      } else {
        animationProgress = gameOverState ? 1 : 0;
      }

      draw(animationProgress);
      requestAnimationFrame(gameFrame);
    }

    dirButtons.forEach(btn => btn.addEventListener('click', () => handleDir(btn.dataset.dir)));
    startBtn.addEventListener('click', startGame);
    pauseBtn.addEventListener('click', togglePause);
    restartBtn.addEventListener('click', resetGame);

    canvas.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      if (Math.abs(dx) < 16 && Math.abs(dy) < 16) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        handleDir(dx > 0 ? 'right' : 'left');
      } else {
        handleDir(dy > 0 ? 'down' : 'up');
      }
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: false });

    document.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'arrowup' || k === 'w') handleDir('up');
      if (k === 'arrowdown' || k === 's') handleDir('down');
      if (k === 'arrowleft' || k === 'a') handleDir('left');
      if (k === 'arrowright' || k === 'd') handleDir('right');
      if (k === ' ') { e.preventDefault(); togglePause(); }
      if (k === 'r') resetGame();
    });

    loadBest();
    resetGame();
    requestAnimationFrame(gameFrame);
  </script>
</body>
</html>
