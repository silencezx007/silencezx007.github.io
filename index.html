<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张旭 | 工程管理 & AI 开发者</title>

    <!-- GridStack.js -->
    <link href="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack-extra.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --card-bg-hover: #273549;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --drawer-width: 280px;
            --header-height: 200px;
        }

        * {
            box-sizing: border-box;
        }

        /* ===== 自定义滚动条（深色主题） ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.5);
        }

        /* Firefox 滚动条 */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(148, 163, 184, 0.3) transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== 抽屉样式 ===== */
        .drawer {
            position: fixed;
            top: 0;
            height: 100vh;
            width: var(--drawer-width);
            background: linear-gradient(180deg, #1a2744 0%, #0f172a 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            transition: transform 0.3s ease;
            padding: 20px;
            overflow-y: auto;
        }

        .drawer-left {
            left: 0;
            transform: translateX(-100%);
            border-right: 1px solid rgba(56, 189, 248, 0.2);
        }

        .drawer-right {
            right: 0;
            transform: translateX(100%);
            border-left: 1px solid rgba(56, 189, 248, 0.2);
        }

        .drawer.open {
            transform: translateX(0);
        }

        .drawer-toggle {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 60px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent);
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .drawer-toggle:hover {
            background: var(--accent);
            color: var(--bg-color);
        }

        .drawer-toggle-left {
            left: 0;
            border-radius: 0 8px 8px 0;
        }

        .drawer-toggle-right {
            right: 0;
            border-radius: 8px 0 0 8px;
        }

        .drawer-title {
            color: var(--accent);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .drawer-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: var(--text-primary);
        }

        .drawer-item:hover {
            background: rgba(56, 189, 248, 0.1);
            transform: translateX(5px);
        }

        .drawer-item-icon {
            font-size: 1.5rem;
        }

        .drawer-item-text {
            font-size: 0.9rem;
        }

        /* ===== 主内容区 ===== */
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 60px;
        }

        header {
            text-align: center;
            padding: 40px 0 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            color: var(--accent);
            font-size: 1.2rem;
            font-weight: 500;
        }

        .intro {
            color: var(--text-secondary);
            max-width: 600px;
            margin: 20px auto;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent) 0%, #0ea5e9 100%);
            color: #0f172a;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        /* ===== 分类标签 ===== */
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            padding: 10px 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            padding: 8px 20px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .category-tab:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .category-tab.active {
            background: var(--accent);
            color: var(--bg-color);
            border-color: var(--accent);
            font-weight: 600;
        }

        /* ===== GridStack 样式 ===== */
        .grid-stack {
            margin-bottom: 40px;
        }

        .grid-stack-item-content {
            /* 玻璃态背景 - 更高透明度 */
            background: linear-gradient(135deg,
                    rgba(30, 41, 59, 0.45) 0%,
                    rgba(15, 23, 42, 0.35) 100%);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);

            /* 发光边框 */
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                0 0 0 1px rgba(56, 189, 248, 0.08);

            padding: 24px;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }

        /* 顶部高光线条 */
        .grid-stack-item-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.2) 20%,
                    rgba(255, 255, 255, 0.3) 50%,
                    rgba(255, 255, 255, 0.2) 80%,
                    transparent);
            border-radius: 1px;
        }

        .grid-stack-item-content:hover {
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 35px rgba(56, 189, 248, 0.2);
            transform: translateY(-4px);
            background: linear-gradient(135deg,
                    rgba(30, 41, 59, 0.55) 0%,
                    rgba(15, 23, 42, 0.45) 100%);
        }

        .grid-stack-item-content.ui-draggable-dragging {
            box-shadow:
                0 20px 50px rgba(56, 189, 248, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 40px rgba(56, 189, 248, 0.25);
            border-color: var(--accent);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .card-icon {
            font-size: 1.8rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .card-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            flex: 1;
            overflow: hidden;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            margin-top: auto;
            padding-top: 10px;
        }

        .card-link:hover {
            text-decoration: underline;
        }

        .card-category-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.7rem;
            padding: 3px 8px;
            background: rgba(56, 189, 248, 0.2);
            border-radius: 10px;
            color: var(--accent);
        }

        /* 拖拽手柄 */
        .drag-handle {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 20px;
            height: 20px;
            cursor: move;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .grid-stack-item-content:hover .drag-handle {
            opacity: 0.8;
        }

        .drag-handle::before {
            content: '⋮⋮';
            color: var(--text-secondary);
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* 调整大小手柄样式 */
        .gs-resizable-handle {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .grid-stack-item:hover .gs-resizable-handle {
            opacity: 1;
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 40px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .dashboard {
                padding: 20px 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .drawer-toggle {
                display: none;
            }

            .category-tabs {
                padding: 10px 0;
            }
        }

        /* 隐藏卡片动画 */
        .grid-stack-item.hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <!-- 左侧抽屉 -->
    <aside class="drawer drawer-left" id="drawer-left">
        <div class="drawer-title">📦 更多工具</div>
        <a href="#" class="drawer-item">
            <span class="drawer-item-icon">📝</span>
            <span class="drawer-item-text">备忘录</span>
        </a>
        <a href="#" class="drawer-item">
            <span class="drawer-item-icon">📅</span>
            <span class="drawer-item-text">日历</span>
        </a>
        <a href="#" class="drawer-item">
            <span class="drawer-item-icon">🧮</span>
            <span class="drawer-item-text">计算器</span>
        </a>
    </aside>

    <!-- 右侧抽屉 -->
    <aside class="drawer drawer-right" id="drawer-right">
        <div class="drawer-title">📚 学习资源</div>
        <a href="#" class="drawer-item">
            <span class="drawer-item-icon">🎓</span>
            <span class="drawer-item-text">AI 课程</span>
        </a>
        <a href="#" class="drawer-item">
            <span class="drawer-item-icon">📖</span>
            <span class="drawer-item-text">技术文档</span>
        </a>
        <a href="#" class="drawer-item">
            <span class="drawer-item-icon">🔗</span>
            <span class="drawer-item-text">收藏链接</span>
        </a>
    </aside>

    <!-- 抽屉开关按钮 -->
    <button class="drawer-toggle drawer-toggle-left" id="toggle-left">☰</button>
    <button class="drawer-toggle drawer-toggle-right" id="toggle-right">☰</button>

    <!-- 主内容区 -->
    <main class="dashboard">
        <header>
            <h1>张旭</h1>
            <p class="tagline">从安哥拉机场建设到 AI 一人公司</p>
            <p class="intro">
                我是中航国际工程公司的项目经理，常驻安哥拉。目前正利用业余时间探索 AI 编程，
                致力于通过技术解决实际问题，构建属于自己的"一人企业"。
            </p>
            <a href="mailto:silencezx007@gmail.com" class="btn">📧 邮件联系我</a>
        </header>

        <!-- 分类标签 -->
        <nav class="category-tabs">
            <button class="category-tab active" data-category="all">🏠 全部</button>
            <button class="category-tab" data-category="work">💼 工作</button>
            <button class="category-tab" data-category="ai">🤖 AI 工具</button>
            <button class="category-tab" data-category="invest">📈 投资</button>
            <button class="category-tab" data-category="efficiency">⚡ 效率</button>
            <button class="category-tab" data-category="learn">📚 学习</button>
        </nav>

        <!-- GridStack 网格容器 -->
        <div class="grid-stack" id="grid"></div>

        <footer>
            <p>© 2026 张旭. All rights reserved. | Hosted on GitHub Pages</p>
            <p style="font-size: 0.75rem; margin-top: 5px;">💡 提示：拖拽卡片可调整位置，拖动右下角可调整大小</p>
        </footer>
    </main>

    <!-- GridStack.js -->
    <script src="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack-all.min.js"></script>

    <!-- Tidio Chat -->
    <script src="//code.tidio.co/hmava4sypxdtlxsbqexjicbnweyhenfj.js" async></script>

    <script>
        // ===== 应用卡片配置 =====
        const apps = [
            {
                id: 'airport',
                icon: '✈️',
                title: '机场运维',
                desc: '负责安哥拉内图博士国际机场（AIAAN）的运维项目管理。处理包括登机桥、行李系统及地面电源单元（GPU）的技术协调与合同管理。',
                url: 'http://10.10.10.203/',
                category: 'work',
                w: 2, h: 2, x: 0, y: 0
            },
            {
                id: 'translator',
                icon: '🤖',
                title: 'AI 翻译器',
                desc: '基于 Gemini 1.5 Flash 的 Speech-to-Meaning 翻译工具，支持中葡互译。',
                url: 'translator.html',
                category: 'ai',
                w: 2, h: 1, x: 2, y: 0
            },
            {
                id: 'crypto',
                icon: '📈',
                title: '量化追踪器',
                desc: '加密货币量化追踪系统，基于预测模型自动开平仓——类似于一个迷你对冲基金。',
                url: '#',
                category: 'invest',
                w: 2, h: 2, x: 4, y: 0
            },
            {
                id: 'jisilu',
                icon: '📊',
                title: '集思录数据',
                desc: 'LOF、ETF、可转债等金融数据追踪与套利监控。',
                url: '#',
                category: 'invest',
                w: 2, h: 1, x: 2, y: 1
            },
            {
                id: 'nicetalk',
                icon: '💬',
                title: 'NiceTalk',
                desc: '轻量级实时聊天 PWA 应用。',
                url: '#',
                category: 'ai',
                w: 1, h: 1, x: 0, y: 2
            },
            {
                id: 'notes',
                icon: '📝',
                title: '快速笔记',
                desc: '随手记录灵感与待办事项。',
                url: '#',
                category: 'efficiency',
                w: 1, h: 1, x: 1, y: 2
            }
        ];

        // ===== 初始化 GridStack =====
        const grid = GridStack.init({
            column: 6,
            cellHeight: 120,
            margin: 0,  // 无间隙
            float: true,
            animate: true,
            draggable: {
                handle: '.drag-handle'
            },
            resizable: {
                handles: 'se'  // 只在右下角显示调整手柄
            }
        });

        // ===== 创建卡片 HTML =====
        function createCardContent(app) {
            return `
                <div class="drag-handle"></div>
                <div class="card-category-badge">${getCategoryName(app.category)}</div>
                <div class="card-header">
                    <span class="card-icon">${app.icon}</span>
                    <h3 class="card-title">${app.title}</h3>
                </div>
                <p class="card-desc">${app.desc}</p>
                ${app.url && app.url !== '#' ? `<a href="${app.url}" target="_blank" class="card-link">打开应用 →</a>` : ''}
            `;
        }

        function getCategoryName(category) {
            const names = {
                work: '💼 工作',
                ai: '🤖 AI',
                invest: '📈 投资',
                efficiency: '⚡ 效率',
                learn: '📚 学习'
            };
            return names[category] || category;
        }

        // ===== 从 localStorage 加载布局或使用默认配置 =====
        function loadLayout() {
            const saved = localStorage.getItem('dashboard-layout');
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    console.warn('Failed to parse saved layout');
                }
            }
            return null;
        }

        function saveLayout() {
            const items = grid.getGridItems().map(el => {
                const node = el.gridstackNode;
                return {
                    id: el.getAttribute('data-app-id'),
                    x: node.x,
                    y: node.y,
                    w: node.w,
                    h: node.h
                };
            });
            localStorage.setItem('dashboard-layout', JSON.stringify(items));
        }

        // ===== 渲染卡片 =====
        function renderApps() {
            const savedLayout = loadLayout();

            apps.forEach(app => {
                // 如果有保存的布局，使用保存的位置和大小
                let position = { x: app.x, y: app.y, w: app.w, h: app.h };
                if (savedLayout) {
                    const savedItem = savedLayout.find(item => item.id === app.id);
                    if (savedItem) {
                        position = { x: savedItem.x, y: savedItem.y, w: savedItem.w, h: savedItem.h };
                    }
                }

                const widget = grid.addWidget({
                    x: position.x,
                    y: position.y,
                    w: position.w,
                    h: position.h,
                    content: createCardContent(app),
                    id: app.id
                });

                // 添加数据属性
                widget.setAttribute('data-app-id', app.id);
                widget.setAttribute('data-category', app.category);
            });
        }

        renderApps();

        // ===== 监听布局变化，自动保存 =====
        grid.on('change', function (event, items) {
            saveLayout();
        });

        // ===== 分类过滤 =====
        const categoryTabs = document.querySelectorAll('.category-tab');
        categoryTabs.forEach(tab => {
            tab.addEventListener('click', function () {
                // 更新激活状态
                categoryTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                const category = this.getAttribute('data-category');
                const items = document.querySelectorAll('.grid-stack-item');

                items.forEach(item => {
                    if (category === 'all' || item.getAttribute('data-category') === category) {
                        item.classList.remove('hidden');
                    } else {
                        item.classList.add('hidden');
                    }
                });

                // 重新布局
                grid.compact();
            });
        });

        // ===== 抽屉控制 =====
        const drawerLeft = document.getElementById('drawer-left');
        const drawerRight = document.getElementById('drawer-right');
        const toggleLeft = document.getElementById('toggle-left');
        const toggleRight = document.getElementById('toggle-right');

        toggleLeft.addEventListener('click', () => {
            drawerLeft.classList.toggle('open');
            drawerRight.classList.remove('open');
        });

        toggleRight.addEventListener('click', () => {
            drawerRight.classList.toggle('open');
            drawerLeft.classList.remove('open');
        });

        // 点击外部关闭抽屉
        document.addEventListener('click', (e) => {
            if (!drawerLeft.contains(e.target) && !toggleLeft.contains(e.target)) {
                drawerLeft.classList.remove('open');
            }
            if (!drawerRight.contains(e.target) && !toggleRight.contains(e.target)) {
                drawerRight.classList.remove('open');
            }
        });
    </script>
</body>

</html>
