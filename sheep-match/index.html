<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>小兵做的羊羊消消乐</title>
  <style>
    :root {
      --bg1: #fff7d6;
      --bg2: #ffd67b;
      --bg3: #ff9f6e;
      --ink: #6f4326;
      --panel: rgba(255,255,255,0.82);
      --shadow: rgba(124, 62, 16, 0.18);
      --accent: #ff7f50;
      --accent-2: #7bc96f;
      --danger: #ff5c7a;
      --tray: #fff1c8;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, #fffef4 0%, rgba(255,255,255,0.7) 18%, transparent 19%),
        linear-gradient(180deg, var(--bg1), var(--bg2) 58%, var(--bg3));
      overflow-x: hidden;
    }
    .app {
      width: min(100%, 920px);
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 14px 12px 18px;
      gap: 12px;
    }
    .top {
      background: var(--panel);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 26px;
      padding: 14px;
      box-shadow: 0 12px 40px var(--shadow);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 6.4vw, 44px);
      line-height: 1.05;
    }
    .sub {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.6;
      color: #8c5d38;
    }
    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .stat {
      background: rgba(255,255,255,0.86);
      border-radius: 18px;
      padding: 10px 8px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
    }
    .stat small {
      display: block;
      font-size: 12px;
      color: #9d6d4b;
      margin-bottom: 6px;
    }
    .stat strong { font-size: clamp(18px, 4vw, 24px); }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    button {
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 800;
      color: white;
      background: linear-gradient(180deg, #ff9e55, #ff7f50);
      box-shadow: 0 10px 18px rgba(255,127,80,0.28);
      cursor: pointer;
      touch-action: manipulation;
    }
    button.alt {
      background: linear-gradient(180deg, #89d36c, #5eb456);
      box-shadow: 0 10px 18px rgba(94,180,86,0.24);
    }
    button:active { transform: translateY(1px) scale(0.99); }
    .board-wrap {
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.58));
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 30px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 16px 32px rgba(145,84,29,0.14);
      padding: 14px;
      min-height: 510px;
      overflow: hidden;
    }
    .meadow {
      position: relative;
      width: 100%;
      height: 470px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 14%, rgba(255,255,255,0.9), rgba(255,255,255,0) 32%),
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.36), rgba(255,255,255,0) 26%),
        radial-gradient(circle at 80% 26%, rgba(255,255,255,0.28), rgba(255,255,255,0) 22%),
        linear-gradient(180deg, #c4f1ff 0%, #dff7ff 24%, #b8ec8d 24%, #97dc6b 64%, #7dcb55 100%);
      box-shadow: inset 0 -12px 20px rgba(51,115,35,0.18);
      overflow: hidden;
    }
    .cloud, .cloud::before, .cloud::after {
      position: absolute;
      background: rgba(255,255,255,0.78);
      border-radius: 999px;
      content: "";
    }
    .cloud {
      width: 84px; height: 26px; top: 26px; left: 24px;
      filter: blur(0.2px);
    }
    .cloud::before { width: 34px; height: 34px; left: 14px; top: -14px; }
    .cloud::after { width: 28px; height: 28px; right: 12px; top: -10px; }
    .cloud.two { left: auto; right: 26px; top: 48px; transform: scale(0.92); }
    .bush {
      position: absolute;
      bottom: 20px;
      width: 74px;
      height: 42px;
      border-radius: 999px;
      background: #63b648;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.08);
      opacity: 0.9;
    }
    .bush.one { left: 10px; }
    .bush.two { right: 12px; width: 88px; height: 48px; }
    .tile {
      position: absolute;
      width: 72px;
      height: 86px;
      border-radius: 22px;
      border: 2px solid rgba(255,255,255,0.72);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,246,224,0.98));
      box-shadow: 0 10px 18px rgba(91, 57, 28, 0.16), inset 0 2px 0 rgba(255,255,255,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 34px;
      user-select: none;
      transform-origin: center center;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.18s ease, opacity 0.18s ease;
      padding-top: 4px;
    }
    .tile .tag {
      font-size: 11px;
      color: #956343;
      font-weight: 700;
      letter-spacing: 0.4px;
    }
    .tile.free {
      box-shadow: 0 12px 20px rgba(91, 57, 28, 0.18), 0 0 0 4px rgba(255,255,255,0.38);
    }
    .tile.blocked {
      filter: grayscale(0.18) brightness(0.92);
      opacity: 0.78;
    }
    .tile:active.free,
    .tile.free:hover {
      transform: translateY(-3px) scale(1.02);
    }
    .tray {
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,249,221,0.92));
      border: 2px solid rgba(255,255,255,0.75);
      border-radius: 26px;
      padding: 12px;
      box-shadow: 0 16px 30px rgba(136,83,26,0.13);
    }
    .tray-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .tray-title { font-weight: 800; font-size: 18px; }
    .tray-note { color: #9a6b42; font-size: 13px; }
    .slots {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .slot {
      height: 68px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), var(--tray));
      border: 2px dashed rgba(188, 128, 68, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: #8f5e34;
      position: relative;
      overflow: hidden;
    }
    .slot .mini {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transform: translateY(2px);
    }
    .slot .mini small {
      font-size: 9px;
      margin-top: 4px;
      color: #9c6e45;
      font-weight: 700;
    }
    .message {
      position: absolute;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(86, 54, 24, 0.26);
      backdrop-filter: blur(6px);
    }
    .message.show { display: flex; }
    .message-card {
      width: min(100%, 420px);
      background: rgba(255,255,255,0.94);
      border-radius: 28px;
      padding: 22px 18px 18px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(95,58,20,0.22);
    }
    .message-card h2 {
      margin: 0;
      font-size: clamp(28px, 8vw, 40px);
    }
    .message-card p {
      margin: 10px 0 16px;
      line-height: 1.6;
      color: #8d5d37;
    }
    .footer-tip {
      text-align: center;
      font-size: 13px;
      color: #8f613c;
      padding-bottom: 6px;
    }
    @media (max-width: 640px) {
      .app { padding: 10px 8px 16px; }
      .top { padding: 12px; border-radius: 22px; }
      .stat-row { grid-template-columns: repeat(2, 1fr); }
      .actions { grid-template-columns: 1fr; }
      .board-wrap { padding: 10px; min-height: 470px; }
      .meadow { height: 420px; }
      .tile { width: 62px; height: 76px; border-radius: 18px; font-size: 30px; }
      .slots { gap: 6px; }
      .slot { height: 60px; border-radius: 16px; font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="top">
      <h1>🐑 小兵做的羊羊消消乐</h1>
      <div class="sub">玩法像“羊了个羊”那种：点能点的卡片，<b>3 张一样就消掉</b>。下面只有 7 个槽，塞满还没消掉就会输。适合直接点着玩，不用键盘。</div>
      <div class="stat-row">
        <div class="stat"><small>关卡</small><strong id="level">1</strong></div>
        <div class="stat"><small>剩余卡片</small><strong id="left">0</strong></div>
        <div class="stat"><small>托盘数量</small><strong id="trayCount">0/7</strong></div>
        <div class="stat"><small>已消除组数</small><strong id="groups">0</strong></div>
      </div>
      <div class="actions">
        <button id="restartBtn">重新开一局</button>
        <button id="nextBtn" class="alt">下一关（更乱一点）</button>
      </div>
    </section>

    <section class="board-wrap">
      <div class="meadow" id="meadow">
        <div class="cloud"></div>
        <div class="cloud two"></div>
        <div class="bush one"></div>
        <div class="bush two"></div>
      </div>
      <div class="message" id="messageLayer">
        <div class="message-card">
          <h2 id="messageTitle">开始玩吧</h2>
          <p id="messageText">点发亮的卡片，把 3 张一样的凑在一起就会自动消掉。</p>
          <button id="messageBtn">知道啦</button>
        </div>
      </div>
    </section>

    <section class="tray">
      <div class="tray-head">
        <div>
          <div class="tray-title">收集槽</div>
          <div class="tray-note">这里最多放 7 张，快凑 3 张一样的把它们消掉～</div>
        </div>
      </div>
      <div class="slots" id="slots"></div>
    </section>

    <div class="footer-tip">小提示：如果一时看不出点哪个，就先找最上面、没被压住的同图案卡片。</div>
  </div>

  <script>
    const meadow = document.getElementById('meadow');
    const slots = document.getElementById('slots');
    const levelEl = document.getElementById('level');
    const leftEl = document.getElementById('left');
    const trayCountEl = document.getElementById('trayCount');
    const groupsEl = document.getElementById('groups');
    const restartBtn = document.getElementById('restartBtn');
    const nextBtn = document.getElementById('nextBtn');
    const messageLayer = document.getElementById('messageLayer');
    const messageTitle = document.getElementById('messageTitle');
    const messageText = document.getElementById('messageText');
    const messageBtn = document.getElementById('messageBtn');

    const ICONS = [
      { icon: '🍓', tag: '草莓' },
      { icon: '🍇', tag: '葡萄' },
      { icon: '🍋', tag: '柠檬' },
      { icon: '🥕', tag: '胡萝卜' },
      { icon: '🌽', tag: '玉米' },
      { icon: '🍒', tag: '樱桃' },
      { icon: '🍎', tag: '苹果' },
      { icon: '🍪', tag: '饼干' },
      { icon: '🧀', tag: '奶酪' },
      { icon: '🥝', tag: '奇异果' }
    ];

    let level = 1;
    let tiles = [];
    let tray = [];
    let removedGroups = 0;
    let gameOver = false;
    let zSeed = 10;

    function tileSize() {
      return window.innerWidth <= 640 ? { w: 62, h: 76 } : { w: 72, h: 86 };
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildPool(count) {
      const tripleCount = Math.ceil(count / 3);
      const pool = [];
      for (let i = 0; i < tripleCount; i++) {
        const typeIndex = i % ICONS.length;
        pool.push(typeIndex, typeIndex, typeIndex);
      }
      return shuffle(pool).slice(0, count);
    }

    function createLayout(count) {
      const { w, h } = tileSize();
      const layouts = [
        { x: 0.18, y: 0.16, cols: 4, rows: 3, stepX: 0.15, stepY: 0.16 },
        { x: 0.12, y: 0.34, cols: 5, rows: 3, stepX: 0.14, stepY: 0.15 },
        { x: 0.26, y: 0.52, cols: 4, rows: 2, stepX: 0.16, stepY: 0.16 },
        { x: 0.35, y: 0.12, cols: 3, rows: 2, stepX: 0.16, stepY: 0.17 }
      ];
      const points = [];
      const boardW = meadow.clientWidth;
      const boardH = meadow.clientHeight;
      for (let layer = 0; layer < layouts.length && points.length < count; layer++) {
        const config = layouts[layer];
        for (let row = 0; row < config.rows && points.length < count; row++) {
          for (let col = 0; col < config.cols && points.length < count; col++) {
            const jitterX = (Math.random() * 10 - 5) + level * 1.2 * (Math.random() - 0.5);
            const jitterY = (Math.random() * 8 - 4) + level * 0.8 * (Math.random() - 0.5);
            const x = Math.round(boardW * (config.x + col * config.stepX) + jitterX);
            const y = Math.round(boardH * (config.y + row * config.stepY) + jitterY);
            points.push({
              x: Math.max(8, Math.min(boardW - w - 8, x)),
              y: Math.max(12, Math.min(boardH - h - 16, y)),
              layer,
              z: zSeed++
            });
          }
        }
      }
      while (points.length < count) {
        points.push({
          x: Math.round(Math.random() * (boardW - w - 16)) + 8,
          y: Math.round(Math.random() * (boardH - h - 40)) + 16,
          layer: layouts.length,
          z: zSeed++
        });
      }
      return shuffle(points).slice(0, count).map((p, index) => ({ ...p, id: index + 1 }));
    }

    function overlaps(a, b) {
      const dx = Math.abs(a.x - b.x);
      const dy = Math.abs(a.y - b.y);
      return dx < 48 && dy < 58;
    }

    function recomputeBlocked() {
      tiles.forEach(tile => {
        tile.blocked = tiles.some(other => {
          if (other.removed || other.id === tile.id) return false;
          if (other.z <= tile.z) return false;
          return overlaps(tile, other);
        });
      });
    }

    function renderBoard() {
      meadow.querySelectorAll('.tile').forEach(node => node.remove());
      recomputeBlocked();
      tiles
        .filter(tile => !tile.removed)
        .sort((a, b) => a.z - b.z)
        .forEach(tile => {
          const div = document.createElement('button');
          div.type = 'button';
          div.className = `tile ${tile.blocked ? 'blocked' : 'free'}`;
          div.style.left = tile.x + 'px';
          div.style.top = tile.y + 'px';
          div.style.zIndex = tile.z;
          div.innerHTML = `<div>${ICONS[tile.type].icon}</div><div class="tag">${ICONS[tile.type].tag}</div>`;
          div.setAttribute('aria-label', ICONS[tile.type].tag + (tile.blocked ? '（被压住）' : '（可点）'));
          if (!tile.blocked && !gameOver) {
            div.addEventListener('click', () => pickTile(tile.id));
          } else {
            div.disabled = true;
          }
          meadow.appendChild(div);
        });
      updateStats();
    }

    function renderTray() {
      slots.innerHTML = '';
      for (let i = 0; i < 7; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        if (tray[i]) {
          slot.innerHTML = `<div class="mini"><div>${ICONS[tray[i].type].icon}</div><small>${ICONS[tray[i].type].tag}</small></div>`;
        }
        slots.appendChild(slot);
      }
      trayCountEl.textContent = `${tray.length}/7`;
    }

    function updateStats() {
      const leftCount = tiles.filter(tile => !tile.removed).length;
      leftEl.textContent = leftCount;
      groupsEl.textContent = removedGroups;
      levelEl.textContent = level;
      trayCountEl.textContent = `${tray.length}/7`;
    }

    function showMessage(title, text, buttonText = '再来一局', action = () => startLevel(level)) {
      messageTitle.textContent = title;
      messageText.textContent = text;
      messageBtn.textContent = buttonText;
      messageBtn.onclick = () => {
        messageLayer.classList.remove('show');
        action();
      };
      messageLayer.classList.add('show');
    }

    function checkMatches() {
      const countByType = {};
      tray.forEach(item => {
        countByType[item.type] = (countByType[item.type] || 0) + 1;
      });
      const matchedType = Object.keys(countByType).find(type => countByType[type] >= 3);
      if (matchedType === undefined) return;
      let removed = 0;
      tray = tray.filter(item => {
        if (item.type === Number(matchedType) && removed < 3) {
          removed++;
          return false;
        }
        return true;
      });
      removedGroups++;
      renderTray();
      updateStats();
      setTimeout(() => {
        const leftCount = tiles.filter(tile => !tile.removed).length;
        if (leftCount === 0 && tray.length === 0) {
          gameOver = true;
          showMessage('通关啦！🎉', `你把第 ${level} 关清空啦，真的很稳！要不要试试下一关？`, '下一关', () => { level += 1; startLevel(level); });
        }
      }, 120);
    }

    function pickTile(id) {
      if (gameOver) return;
      const tile = tiles.find(item => item.id === id);
      if (!tile || tile.removed || tile.blocked) return;
      tile.removed = true;
      tray.push({ type: tile.type, sourceId: tile.id });
      renderTray();
      renderBoard();
      checkMatches();
      if (tray.length >= 7) {
        gameOver = true;
        showMessage('哎呀，槽满啦', '下面 7 个槽都满了，还没凑出 3 张一样的。别慌，重新来一把就好～');
        return;
      }
      const leftCount = tiles.filter(item => !item.removed).length;
      if (leftCount === 0) {
        checkMatches();
      }
    }

    function startLevel(targetLevel) {
      gameOver = false;
      tray = [];
      removedGroups = 0;
      const count = Math.min(24 + (targetLevel - 1) * 3, 42);
      const pool = buildPool(count);
      const layout = createLayout(count);
      tiles = layout.map((pos, index) => ({
        id: pos.id,
        type: pool[index],
        x: pos.x,
        y: pos.y,
        z: pos.z + pos.layer * 20,
        layer: pos.layer,
        removed: false,
        blocked: false
      }));
      renderTray();
      renderBoard();
      messageLayer.classList.remove('show');
    }

    restartBtn.addEventListener('click', () => startLevel(level));
    nextBtn.addEventListener('click', () => {
      level += 1;
      startLevel(level);
    });

    window.addEventListener('resize', () => {
      const currentLevel = level;
      startLevel(currentLevel);
    });

    startLevel(level);
    showMessage('准备好啦？', '点发亮的卡片，凑齐 3 张一样的就会自动消掉。先从第 1 关热热身～', '开始玩', () => startLevel(level));
  </script>
</body>
</html>
