<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>表情包工坊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { touch-action: manipulation; }
  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(160deg, #fff0f6 0%, #f3eaff 55%, #fff8e1 100%);
    min-height: 100vh;
    color: #5a4a6a;
    -webkit-user-select: none;
    user-select: none;
  }
  .screen { display: none; max-width: 520px; margin: 0 auto; padding: 20px 16px 40px; }
  .screen.active { display: block; }

  /* ---------- 首页 ---------- */
  .hero { text-align: center; padding-top: 28px; }
  .hero h1 {
    font-size: 34px; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(90deg, #ff7bac, #a06bff, #ffb347);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: #ff7bac;
  }
  .hero p { margin-top: 10px; font-size: 15px; color: #8a7a9a; }
  .samples { display: flex; justify-content: center; gap: 12px; margin: 22px 0 8px; }
  .samples canvas {
    width: 96px; height: 96px; border-radius: 18px;
    box-shadow: 0 6px 16px rgba(160, 107, 255, .18);
    border: 3px solid #fff;
  }
  .samples canvas:nth-child(2) { transform: translateY(-8px) rotate(-3deg); }
  .samples canvas:nth-child(1) { transform: rotate(4deg); }
  .samples canvas:nth-child(3) { transform: rotate(3deg); }
  .btn-big {
    display: block; width: 100%; max-width: 320px; margin: 22px auto 6px;
    padding: 16px 0; min-height: 56px;
    font-size: 20px; font-weight: 800; letter-spacing: 4px; color: #fff;
    background: linear-gradient(90deg, #ff8fb8, #b08cff);
    border: none; border-radius: 30px; cursor: pointer;
    box-shadow: 0 8px 20px rgba(255, 123, 172, .35);
  }
  .btn-big:active { transform: scale(.97); }
  .grid-title { margin: 26px 0 12px; font-size: 16px; font-weight: 700; color: #7a5a9a; text-align: center; }
  .base-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 12px; }
  .base-grid .cell {
    border-radius: 18px; overflow: hidden; border: 3px solid #fff;
    box-shadow: 0 4px 12px rgba(160, 107, 255, .15); cursor: pointer;
    background: #fff; padding: 0; min-height: 44px;
  }
  .base-grid .cell:active { transform: scale(.95); }
  .base-grid canvas { width: 100%; height: auto; display: block; }

  /* ---------- 编辑页 ---------- */
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .topbar .title { font-size: 18px; font-weight: 800; color: #7a5a9a; }
  .btn-mini {
    padding: 10px 16px; min-height: 44px; min-width: 44px;
    font-size: 15px; font-weight: 700; color: #a06bff;
    background: #fff; border: 2px solid #e3d5ff; border-radius: 22px; cursor: pointer;
  }
  .btn-mini:active { transform: scale(.95); }
  #editCanvas {
    width: 100%; max-width: 480px; display: block; margin: 0 auto;
    border-radius: 20px; border: 3px solid #fff;
    box-shadow: 0 8px 24px rgba(160, 107, 255, .2);
    touch-action: none; cursor: grab;
  }
  .hint { text-align: center; font-size: 12px; color: #b09ac5; margin: 8px 0 14px; }
  .panel { background: rgba(255,255,255,.75); border-radius: 20px; padding: 14px; margin-bottom: 12px; }
  .panel label.plabel { display: block; font-size: 13px; font-weight: 700; color: #9a7ab8; margin-bottom: 8px; }
  #textInput {
    width: 100%; padding: 12px 14px; min-height: 48px;
    font-size: 16px; color: #5a4a6a;
    border: 2px solid #eadcff; border-radius: 14px; outline: none; background: #fff;
    -webkit-user-select: text; user-select: text;
  }
  #textInput:focus { border-color: #c9a9ff; }
  .memes { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .memes button {
    padding: 10px 14px; min-height: 44px; font-size: 14px; font-weight: 600;
    color: #ff6fa5; background: #fff0f6; border: 2px solid #ffd6e7;
    border-radius: 20px; cursor: pointer;
  }
  .memes button:active { transform: scale(.93); }
  .colors { display: flex; gap: 12px; flex-wrap: wrap; }
  .colors button {
    width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
    border: 3px solid rgba(0,0,0,.08); box-shadow: 0 2px 6px rgba(0,0,0,.12);
  }
  .colors button.sel { border: 3px solid #a06bff; outline: 3px solid #e3d5ff; }
  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 44px; background: transparent;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 10px; border-radius: 5px; background: linear-gradient(90deg, #ffd6e7, #d9c4ff);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 28px; height: 28px; margin-top: -9px;
    border-radius: 50%; background: #fff; border: 3px solid #b08cff;
    box-shadow: 0 2px 6px rgba(0,0,0,.15); cursor: pointer;
  }
  .btn-done {
    display: block; width: 100%; padding: 15px 0; min-height: 54px; margin-top: 4px;
    font-size: 18px; font-weight: 800; letter-spacing: 3px; color: #fff;
    background: linear-gradient(90deg, #ffb347, #ff8fb8);
    border: none; border-radius: 28px; cursor: pointer;
    box-shadow: 0 8px 20px rgba(255, 179, 71, .35);
  }
  .btn-done:active { transform: scale(.97); }

  /* ---------- 成品页 ---------- */
  .result-wrap { text-align: center; padding-top: 20px; }
  .result-wrap h2 { font-size: 22px; font-weight: 800; color: #7a5a9a; }
  #resultImg {
    width: 100%; max-width: 400px; margin: 18px auto 0; display: block;
    border-radius: 20px; border: 3px solid #fff;
    box-shadow: 0 10px 28px rgba(160, 107, 255, .25);
    -webkit-user-select: auto; user-select: auto;
    -webkit-touch-callout: default;
  }
  .save-tip {
    margin: 16px auto 0; display: inline-block; padding: 10px 18px;
    font-size: 15px; font-weight: 700; color: #ff6fa5;
    background: #fff0f6; border-radius: 20px; border: 2px dashed #ffb3d1;
  }
  .btn-again {
    display: block; width: 100%; max-width: 300px; margin: 24px auto 0;
    padding: 14px 0; min-height: 52px;
    font-size: 18px; font-weight: 800; letter-spacing: 3px; color: #fff;
    background: linear-gradient(90deg, #a06bff, #ff8fb8);
    border: none; border-radius: 28px; cursor: pointer;
    box-shadow: 0 8px 20px rgba(160, 107, 255, .35);
  }
  .btn-again:active { transform: scale(.97); }
</style>
</head>
<body>

<!-- 首页 -->
<section id="screen-home" class="screen active">
  <div class="hero">
    <h1>表情包工坊</h1>
    <p>选个小可爱，配上你的梗，30 秒做出专属表情包！</p>
    <div class="samples" id="samples"></div>
    <button class="btn-big" id="btnStart">开始制作 ✦</button>
  </div>
  <div class="grid-title">— 挑一个底图开始 —</div>
  <div class="base-grid" id="baseGrid"></div>
</section>

<!-- 编辑页 -->
<section id="screen-edit" class="screen">
  <div class="topbar">
    <button class="btn-mini" id="btnBack">← 换底图</button>
    <div class="title">配字</div>
    <button class="btn-mini" style="visibility:hidden">占位</button>
  </div>
  <canvas id="editCanvas"></canvas>
  <div class="hint">✧ 按住文字可以拖动位置 ✧</div>

  <div class="panel">
    <label class="plabel" for="textInput">写点什么</label>
    <input id="textInput" type="text" maxlength="20" placeholder="输入文字，或点下面的梗" value="就这？">
    <div class="memes" id="memeBtns"></div>
  </div>

  <div class="panel">
    <label class="plabel">文字颜色</label>
    <div class="colors" id="colorBtns"></div>
  </div>

  <div class="panel">
    <label class="plabel" for="sizeRange">字号</label>
    <input id="sizeRange" type="range" min="24" max="80" value="44">
  </div>

  <button class="btn-done" id="btnDone">做好了，出图！</button>
</section>

<!-- 成品页 -->
<section id="screen-result" class="screen">
  <div class="result-wrap">
    <h2>🎉 做好啦！</h2>
    <img id="resultImg" alt="你的表情包成品">
    <div><span class="save-tip">长按图片保存，发给朋友吧！</span></div>
    <button class="btn-again" id="btnAgain">再来一张</button>
  </div>
</section>

<script>
'use strict';

/* ==========================================================
 * 配置区
 * ========================================================== */

// 文案库：这里改（预设梗文案快捷按钮，想加想删都在这个数组里）
const MEME_TEXTS = [
  '就这？',
  '退退退',
  '让我看看',
  '破防了',
  '听我说谢谢你',
  '稳住我们能赢',
  '上课别叫我',
  '作业写完了吗',
];

// 分享短链接：上线后填入，为空则水印不显示链接部分
const SHARE_URL = 'silencezx007.github.io/emoji-workshop';

// 水印文字
const WATERMARK = '表情包工坊';

// 画布逻辑尺寸（正方形）
const SIZE = 480;

// 文字颜色（fill 为字色，stroke 为反色描边，保证任何底图上可读）
const TEXT_COLORS = [
  { name: '白', fill: '#ffffff', stroke: '#333333' },
  { name: '黑', fill: '#333333', stroke: '#ffffff' },
  { name: '粉', fill: '#ff6fa5', stroke: '#ffffff' },
  { name: '黄', fill: '#ffc93c', stroke: '#7a5a00' },
  { name: '蓝', fill: '#5aa9ff', stroke: '#ffffff' },
  { name: '紫', fill: '#a06bff', stroke: '#ffffff' },
];

/* ==========================================================
 * 底图绘制（全部程序化生成的可爱形象）
 * 每张一个绘制函数，风格统一：柔和纯色背景 + 粗描边 + 大眼 + 简单几何。
 * 以后要换成手绘图片：把 assets/base-1.png ~ base-10.png 放进去即可，
 * 页面会优先加载图片，加载失败自动回落到这里的程序绘制。
 * ========================================================== */

const OUTLINE = '#4a3b3b';   // 统一描边色
const LW = 7;                // 统一描边粗细

// ---- 通用小零件 ----
function pen(ctx) { ctx.strokeStyle = OUTLINE; ctx.lineWidth = LW; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; }
function bgFill(ctx, color) { ctx.fillStyle = color; ctx.fillRect(0, 0, SIZE, SIZE); }
function dot(ctx, x, y, r, color) { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill(); }
function blush(ctx, x, y) { dot(ctx, x, y, 16, 'rgba(255,140,170,.55)'); }
// 圆点大眼（带高光）
function eyeDot(ctx, x, y, r = 15) {
  dot(ctx, x, y, r, OUTLINE);
  dot(ctx, x - r * .3, y - r * .35, r * .3, '#fff');
}
// 开心眯眯眼（向上弯的弧）
function eyeHappy(ctx, x, y, r = 18) {
  ctx.beginPath(); ctx.arc(x, y + r * .4, r, Math.PI * 1.15, Math.PI * 1.85);
  pen(ctx); ctx.lineWidth = LW + 1; ctx.stroke();
}
// 星星眼
function eyeStar(ctx, x, y, r = 20) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const ang = -Math.PI / 2 + i * Math.PI / 5;
    const rr = i % 2 === 0 ? r : r * .45;
    const px = x + Math.cos(ang) * rr, py = y + Math.sin(ang) * rr;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = '#ffd93c'; ctx.fill();
  pen(ctx); ctx.lineWidth = 4; ctx.stroke();
}
// 无语半闭眼（一条平线 + 半眼皮）
function eyeHalf(ctx, x, y, w = 26) {
  pen(ctx); ctx.lineWidth = LW;
  ctx.beginPath(); ctx.moveTo(x - w / 2, y); ctx.lineTo(x + w / 2, y); ctx.stroke();
}
// 生气眼（斜眉 + 圆眼）
function eyeAngry(ctx, x, y, dir = 1) {
  eyeDot(ctx, x, y, 13);
  pen(ctx); ctx.lineWidth = LW;
  ctx.beginPath();
  ctx.moveTo(x - 20 * dir, y - 34 + (dir > 0 ? -6 : -6));
  ctx.lineTo(x + 16 * dir, y - 22);
  ctx.stroke();
}
// 眼泪（一大颗水滴）
function tearDrop(ctx, x, y) {
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x - 14, y + 26, x - 12, y + 44, x, y + 46);
  ctx.bezierCurveTo(x + 12, y + 44, x + 14, y + 26, x, y);
  ctx.fillStyle = '#8ecdff'; ctx.fill();
  pen(ctx); ctx.lineWidth = 4; ctx.stroke();
}
// 嘴：微笑弧
function mouthSmile(ctx, x, y, w = 30) {
  pen(ctx);
  ctx.beginPath(); ctx.arc(x, y - w * .3, w, Math.PI * .2, Math.PI * .8); ctx.stroke();
}
// 嘴：猫嘴 ω
function mouthCat(ctx, x, y, w = 16) {
  pen(ctx);
  ctx.beginPath();
  ctx.arc(x - w / 2, y, w / 2, 0, Math.PI);
  ctx.arc(x + w / 2, y, w / 2, 0, Math.PI);
  ctx.stroke();
}
// 嘴：张大嘴（开心大叫）
function mouthOpen(ctx, x, y, r = 22) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI);
  ctx.closePath();
  ctx.fillStyle = '#b3486a'; ctx.fill();
  pen(ctx); ctx.lineWidth = 5; ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y + r * .55, r * .5, Math.PI, Math.PI * 2);
  ctx.fillStyle = '#ff9db8'; ctx.fill();
}
// 嘴：一条平线（无语）
function mouthFlat(ctx, x, y, w = 26) {
  pen(ctx);
  ctx.beginPath(); ctx.moveTo(x - w / 2, y); ctx.lineTo(x + w / 2, y); ctx.stroke();
}
// 嘴：波浪委屈嘴
function mouthWavy(ctx, x, y, w = 34) {
  pen(ctx); ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(x - w / 2, y);
  ctx.quadraticCurveTo(x - w / 4, y + 10, x, y);
  ctx.quadraticCurveTo(x + w / 4, y - 10, x + w / 2, y);
  ctx.stroke();
}
// 背景装饰小点点
function sprinkle(ctx, color) {
  const pts = [[60, 70], [420, 60], [50, 400], [430, 410], [240, 40], [400, 240], [70, 240]];
  pts.forEach(([x, y], i) => dot(ctx, x, y, i % 2 ? 6 : 9, color));
}
// 圆脸底（fill 色 + 描边）
function faceBase(ctx, x, y, r, color) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  pen(ctx); ctx.stroke();
}

// ---- 1. 圆脸小猫（开心）----
function drawCat(ctx) {
  bgFill(ctx, '#ffe3ee'); sprinkle(ctx, '#ffc2d9');
  const cx = 240, cy = 260, r = 130;
  // 耳朵
  [[-1, 0], [1, 0]].forEach(([d]) => {
    ctx.beginPath();
    ctx.moveTo(cx + d * 55, cy - r + 25);
    ctx.lineTo(cx + d * 105, cy - r - 55);
    ctx.lineTo(cx + d * 118, cy - r + 55);
    ctx.closePath();
    ctx.fillStyle = '#fff6f9'; ctx.fill(); pen(ctx); ctx.stroke();
    // 内耳
    ctx.beginPath();
    ctx.moveTo(cx + d * 72, cy - r + 28);
    ctx.lineTo(cx + d * 100, cy - r - 28);
    ctx.lineTo(cx + d * 106, cy - r + 38);
    ctx.closePath();
    ctx.fillStyle = '#ffb3cd'; ctx.fill();
  });
  faceBase(ctx, cx, cy, r, '#fff6f9');
  // 胡须
  pen(ctx); ctx.lineWidth = 4;
  [[-1, 0], [1, 0]].forEach(([d]) => {
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(cx + d * (r - 30), cy + 20 + i * 16);
      ctx.lineTo(cx + d * (r + 30), cy + 14 + i * 22);
      ctx.stroke();
    }
  });
  eyeHappy(ctx, cx - 52, cy - 20); eyeHappy(ctx, cx + 52, cy - 20);
  dot(ctx, cx, cy + 14, 8, '#ff8fae');            // 鼻子
  mouthCat(ctx, cx, cy + 34);
  blush(ctx, cx - 78, cy + 26); blush(ctx, cx + 78, cy + 26);
}

// ---- 2. 圆脸小狗（星星眼）----
function drawDog(ctx) {
  bgFill(ctx, '#fff3d6'); sprinkle(ctx, '#ffdf9e');
  const cx = 240, cy = 260, r = 130;
  // 垂耳
  [[-1], [1]].forEach(([d]) => {
    ctx.beginPath();
    ctx.ellipse(cx + d * 118, cy - 40, 42, 78, d * .35, 0, Math.PI * 2);
    ctx.fillStyle = '#c98d5f'; ctx.fill(); pen(ctx); ctx.stroke();
  });
  faceBase(ctx, cx, cy, r, '#f6e2c8');
  // 眼周斑块
  ctx.beginPath(); ctx.ellipse(cx + 52, cy - 26, 34, 40, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#e4c49e'; ctx.fill();
  eyeStar(ctx, cx - 52, cy - 22); eyeStar(ctx, cx + 52, cy - 22);
  // 鼻嘴
  ctx.beginPath(); ctx.ellipse(cx, cy + 24, 14, 10, 0, 0, Math.PI * 2);
  ctx.fillStyle = OUTLINE; ctx.fill();
  mouthOpen(ctx, cx, cy + 58, 18);
  blush(ctx, cx - 82, cy + 22); blush(ctx, cx + 82, cy + 22);
}

// ---- 3. 圆脸小熊（无语）----
function drawBear(ctx) {
  bgFill(ctx, '#eaddcf'); sprinkle(ctx, '#d9c4a9');
  const cx = 240, cy = 265, r = 128;
  // 圆耳
  [[-1], [1]].forEach(([d]) => {
    ctx.beginPath(); ctx.arc(cx + d * 95, cy - r + 15, 42, 0, Math.PI * 2);
    ctx.fillStyle = '#b98c62'; ctx.fill(); pen(ctx); ctx.stroke();
    dot(ctx, cx + d * 95, cy - r + 15, 20, '#e8cba8');
  });
  faceBase(ctx, cx, cy, r, '#b98c62');
  // 口鼻区
  ctx.beginPath(); ctx.ellipse(cx, cy + 42, 58, 44, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#efd8b8'; ctx.fill(); pen(ctx); ctx.lineWidth = 5; ctx.stroke();
  eyeHalf(ctx, cx - 52, cy - 22); eyeHalf(ctx, cx + 52, cy - 22);
  ctx.beginPath(); ctx.ellipse(cx, cy + 28, 13, 9, 0, 0, Math.PI * 2);
  ctx.fillStyle = OUTLINE; ctx.fill();
  mouthFlat(ctx, cx, cy + 58);
  // 三滴汗
  ctx.beginPath();
  ctx.moveTo(cx + 96, cy - 90);
  ctx.bezierCurveTo(cx + 84, cy - 68, cx + 86, cy - 54, cx + 96, cy - 52);
  ctx.bezierCurveTo(cx + 106, cy - 54, cx + 108, cy - 68, cx + 96, cy - 90);
  ctx.fillStyle = '#8ecdff'; ctx.fill(); pen(ctx); ctx.lineWidth = 4; ctx.stroke();
}

// ---- 4. 兔子（流泪委屈）----
function drawRabbit(ctx) {
  bgFill(ctx, '#efe4ff'); sprinkle(ctx, '#d9c4ff');
  const cx = 240, cy = 290, r = 118;
  // 长耳
  [[-1], [1]].forEach(([d]) => {
    ctx.beginPath();
    ctx.ellipse(cx + d * 62, cy - r - 78, 34, 100, d * .12, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff'; ctx.fill(); pen(ctx); ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(cx + d * 62, cy - r - 70, 16, 72, d * .12, 0, Math.PI * 2);
    ctx.fillStyle = '#ffc2d9'; ctx.fill();
  });
  faceBase(ctx, cx, cy, r, '#ffffff');
  eyeDot(ctx, cx - 48, cy - 18, 14); eyeDot(ctx, cx + 48, cy - 18, 14);
  tearDrop(ctx, cx - 48, cy + 4); tearDrop(ctx, cx + 48, cy + 4);
  dot(ctx, cx, cy + 12, 7, '#ff8fae');
  mouthWavy(ctx, cx, cy + 42);
  blush(ctx, cx - 76, cy + 18); blush(ctx, cx + 76, cy + 18);
}

// ---- 5. 青蛙（生气）----
function drawFrog(ctx) {
  bgFill(ctx, '#e2f5d8'); sprinkle(ctx, '#bfe6a8');
  const cx = 240, cy = 285, r = 122;
  // 头顶鼓眼
  [[-1], [1]].forEach(([d]) => {
    ctx.beginPath(); ctx.arc(cx + d * 70, cy - r + 12, 52, 0, Math.PI * 2);
    ctx.fillStyle = '#8fd36c'; ctx.fill(); pen(ctx); ctx.stroke();
  });
  faceBase(ctx, cx, cy, r, '#8fd36c');
  // 鼓眼白 + 生气眼
  [[-1], [1]].forEach(([d]) => {
    dot(ctx, cx + d * 70, cy - r + 12, 34, '#ffffff');
    pen(ctx); ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(cx + d * 70, cy - r + 12, 34, 0, Math.PI * 2); ctx.stroke();
    eyeAngry(ctx, cx + d * 70, cy - r + 16, d);
  });
  // 肚皮
  ctx.beginPath(); ctx.ellipse(cx, cy + 70, 66, 46, 0, Math.PI, Math.PI * 2, true);
  ctx.fillStyle = '#dff2c8'; ctx.fill();
  // 气鼓鼓的嘴
  mouthWavy(ctx, cx, cy + 26, 44);
  // 怒气符号
  pen(ctx); ctx.strokeStyle = '#e05a5a'; ctx.lineWidth = 6;
  const ax = cx + 118, ay = cy - 96;
  [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.arc(ax + dx * 13, ay + dy * 13, 12, dy > 0 ? Math.PI : 0, dy > 0 ? Math.PI * 2 : Math.PI, dy < 0);
    ctx.stroke();
  });
  ctx.strokeStyle = OUTLINE;
  blush(ctx, cx - 72, cy + 14); blush(ctx, cx + 72, cy + 14);
}

// ---- 6. 企鹅（开心大叫）----
function drawPenguin(ctx) {
  bgFill(ctx, '#dbeeff'); sprinkle(ctx, '#b3d9ff');
  const cx = 240, cy = 265, r = 130;
  faceBase(ctx, cx, cy, r, '#4a5568');
  // 白肚脸
  ctx.beginPath(); ctx.ellipse(cx, cy + 28, 92, 96, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff'; ctx.fill();
  // 小翅膀
  [[-1], [1]].forEach(([d]) => {
    ctx.beginPath();
    ctx.ellipse(cx + d * 132, cy + 40, 22, 52, d * .5, 0, Math.PI * 2);
    ctx.fillStyle = '#4a5568'; ctx.fill(); pen(ctx); ctx.stroke();
  });
  eyeHappy(ctx, cx - 46, cy - 26); eyeHappy(ctx, cx + 46, cy - 26);
  // 喙
  ctx.beginPath();
  ctx.moveTo(cx - 16, cy + 4); ctx.lineTo(cx + 16, cy + 4); ctx.lineTo(cx, cy + 24);
  ctx.closePath();
  ctx.fillStyle = '#ffb347'; ctx.fill(); pen(ctx); ctx.lineWidth = 5; ctx.stroke();
  mouthOpen(ctx, cx, cy + 52, 20);
  blush(ctx, cx - 72, cy + 8); blush(ctx, cx + 72, cy + 8);
}

// ---- 7. 幽灵（惊讶）----
function drawGhost(ctx) {
  bgFill(ctx, '#e6e0f8'); sprinkle(ctx, '#c9bdf0');
  const cx = 240, cy = 250, r = 110;
  // 幽灵身体：半圆 + 波浪下摆
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0);
  ctx.lineTo(cx + r, cy + 95);
  for (let i = 0; i < 5; i++) {
    const x1 = cx + r - (i * 2 + 1) * r / 5;
    ctx.quadraticCurveTo(x1 + r / 5, cy + (i % 2 ? 70 : 130), x1, cy + 95 + (i % 2 ? 8 : 0));
  }
  ctx.closePath();
  ctx.fillStyle = '#ffffff'; ctx.fill(); pen(ctx); ctx.stroke();
  eyeDot(ctx, cx - 44, cy - 12, 16); eyeDot(ctx, cx + 44, cy - 12, 16);
  // 惊讶 O 嘴
  ctx.beginPath(); ctx.arc(cx, cy + 38, 16, 0, Math.PI * 2);
  ctx.fillStyle = '#b3486a'; ctx.fill(); pen(ctx); ctx.lineWidth = 5; ctx.stroke();
  blush(ctx, cx - 74, cy + 16); blush(ctx, cx + 74, cy + 16);
  // 头顶小卷
  pen(ctx); ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(cx + 8, cy - r - 14, 14, Math.PI * .5, Math.PI * 1.8); ctx.stroke();
}

// ---- 8. 饭团（害羞开心）----
function drawOnigiri(ctx) {
  bgFill(ctx, '#fff8e6'); sprinkle(ctx, '#ffe3a8');
  const cx = 240, cy = 270;
  // 三角饭团（圆角）
  ctx.beginPath();
  ctx.moveTo(cx, cy - 140);
  ctx.arcTo(cx + 135, cy + 95, cx - 135, cy + 95, 46);
  ctx.arcTo(cx - 135, cy + 95, cx, cy - 140, 46);
  ctx.arcTo(cx, cy - 140, cx + 135, cy + 95, 46);
  ctx.closePath();
  ctx.fillStyle = '#ffffff'; ctx.fill(); pen(ctx); ctx.stroke();
  // 海苔
  ctx.beginPath();
  ctx.rect(cx - 44, cy + 18, 88, 74);
  ctx.fillStyle = '#3d5443'; ctx.fill(); pen(ctx); ctx.lineWidth = 5; ctx.stroke();
  eyeHappy(ctx, cx - 44, cy - 26, 15); eyeHappy(ctx, cx + 44, cy - 26, 15);
  mouthCat(ctx, cx, cy - 2, 14);
  blush(ctx, cx - 74, cy - 8); blush(ctx, cx + 74, cy - 8);
  // 芝麻点
  [[-90, 60], [86, 40], [-60, -80], [70, -70]].forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.ellipse(cx + dx, cy + dy, 5, 3, .6, 0, Math.PI * 2);
    ctx.fillStyle = '#3d5443'; ctx.fill();
  });
}

// ---- 9. 云朵（困了/无语放空）----
function drawCloud(ctx) {
  bgFill(ctx, '#d8ecff'); sprinkle(ctx, '#ffffff');
  const cx = 240, cy = 265;
  // 云团：多个圆。先逐个描边，再整体填白盖掉内部交叉线，只留外轮廓
  const puffs = [
    [cx - 90, cy + 20, 60], [cx - 30, cy - 40, 72], [cx + 55, cy - 20, 66],
    [cx + 95, cy + 35, 52], [cx, cy + 45, 66],
  ];
  pen(ctx);
  puffs.forEach(([x, y, r]) => {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
  });
  ctx.fillStyle = '#ffffff';
  puffs.forEach(([x, y, r]) => {
    ctx.beginPath(); ctx.arc(x, y, r - LW / 2, 0, Math.PI * 2); ctx.fill();
  });
  eyeHalf(ctx, cx - 40, cy + 2); eyeHalf(ctx, cx + 44, cy + 2);
  mouthWavy(ctx, cx, cy + 34, 30);
  blush(ctx, cx - 78, cy + 22); blush(ctx, cx + 82, cy + 22);
  // zzz
  ctx.fillStyle = '#7aa8d8';
  ctx.font = 'bold 40px sans-serif';
  ctx.fillText('z', cx + 120, cy - 90);
  ctx.font = 'bold 28px sans-serif';
  ctx.fillText('z', cx + 150, cy - 115);
}

// ---- 10. 星星（得意 wink）----
function drawStar(ctx) {
  bgFill(ctx, '#ffeede'); sprinkle(ctx, '#ffd2ae');
  const cx = 240, cy = 255, R = 150, r = 78;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const ang = -Math.PI / 2 + i * Math.PI / 5;
    const rr = i % 2 === 0 ? R : r;
    const px = cx + Math.cos(ang) * rr, py = cy + Math.sin(ang) * rr;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = '#ffd93c'; ctx.fill(); pen(ctx); ctx.lineJoin = 'round'; ctx.stroke();
  // wink：左眼弯 右眼点
  eyeHappy(ctx, cx - 40, cy - 4, 15);
  eyeDot(ctx, cx + 40, cy - 4, 13);
  mouthSmile(ctx, cx, cy + 40, 24);
  blush(ctx, cx - 66, cy + 20); blush(ctx, cx + 66, cy + 20);
  // 周围小闪光
  pen(ctx); ctx.lineWidth = 5;
  [[70, 80], [410, 100], [90, 420]].forEach(([x, y]) => {
    ctx.beginPath();
    ctx.moveTo(x - 12, y); ctx.lineTo(x + 12, y);
    ctx.moveTo(x, y - 12); ctx.lineTo(x, y + 12);
    ctx.stroke();
  });
}

// 底图注册表：name 仅作说明
const BASES = [
  { name: '圆脸小猫·开心', draw: drawCat },
  { name: '小狗·星星眼', draw: drawDog },
  { name: '小熊·无语', draw: drawBear },
  { name: '兔子·流泪', draw: drawRabbit },
  { name: '青蛙·生气', draw: drawFrog },
  { name: '企鹅·开心', draw: drawPenguin },
  { name: '幽灵·惊讶', draw: drawGhost },
  { name: '饭团·害羞', draw: drawOnigiri },
  { name: '云朵·犯困', draw: drawCloud },
  { name: '星星·得意', draw: drawStar },
];

// 手绘图片替换分支：若 assets/base-N.png 存在则优先使用（N 从 1 开始）
// 加载失败（文件不存在等）自动回落到程序绘制，不报错不阻塞。
const baseImages = new Array(BASES.length).fill(null);
BASES.forEach((b, i) => {
  const img = new Image();
  img.onload = () => { baseImages[i] = img; refreshAll(); };
  img.onerror = () => { /* 无图片，用程序绘制 */ };
  img.src = 'assets/base-' + (i + 1) + '.png';
});

// 在指定 ctx 上画第 i 张底图（逻辑坐标 480x480）
function paintBase(ctx, i) {
  if (baseImages[i]) {
    ctx.drawImage(baseImages[i], 0, 0, SIZE, SIZE);
  } else {
    BASES[i].draw(ctx);
  }
}

/* ==========================================================
 * 状态与画布
 * ========================================================== */

const state = {
  baseIndex: 0,
  text: '就这？',
  colorIndex: 0,        // TEXT_COLORS 下标
  fontSize: 44,
  textX: SIZE / 2,
  textY: SIZE - 70,
};

// 创建一个 DPR 高清 canvas，返回 { canvas, ctx }（ctx 已按逻辑坐标 480 缩放）
function makeCanvas(el) {
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  el.width = SIZE * dpr;
  el.height = SIZE * dpr;
  const ctx = el.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return ctx;
}

// 画文字（带反色描边 + 可选阴影），shared by 编辑预览 & 出图
function paintText(ctx, opts) {
  const { text, x, y, size, color } = opts;
  if (!text) return;
  ctx.save();
  ctx.font = '800 ' + size + 'px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = color.stroke;
  ctx.lineWidth = Math.max(4, size * .18);
  ctx.strokeText(text, x, y);
  ctx.fillStyle = color.fill;
  ctx.fillText(text, x, y);
  ctx.restore();
}

// 水印：右下角小字
function paintWatermark(ctx) {
  ctx.save();
  const label = SHARE_URL ? WATERMARK + ' · ' + SHARE_URL : WATERMARK;
  ctx.font = '600 15px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = 'rgba(255,255,255,.9)';
  ctx.lineWidth = 4;
  ctx.strokeText(label, SIZE - 12, SIZE - 10);
  ctx.fillStyle = 'rgba(90,74,106,.75)';
  ctx.fillText(label, SIZE - 12, SIZE - 10);
  ctx.restore();
}

// 完整合成一帧（底图 + 文字 + 水印）
function compose(ctx) {
  ctx.clearRect(0, 0, SIZE, SIZE);
  paintBase(ctx, state.baseIndex);
  paintText(ctx, {
    text: state.text, x: state.textX, y: state.textY,
    size: state.fontSize, color: TEXT_COLORS[state.colorIndex],
  });
  paintWatermark(ctx);
}

/* ==========================================================
 * 页面构建
 * ========================================================== */

const $ = (id) => document.getElementById(id);
const screens = { home: $('screen-home'), edit: $('screen-edit'), result: $('screen-result') };
function show(name) {
  Object.values(screens).forEach((s) => s.classList.remove('active'));
  screens[name].classList.add('active');
  window.scrollTo(0, 0);
}

// --- 首页：示例成品图（底图 + 示例文案现场渲染）---
const SAMPLES = [
  { base: 0, text: '就这？' },
  { base: 3, text: '破防了' },
  { base: 9, text: '稳住我们能赢' },
];
function renderSamples() {
  const wrap = $('samples');
  wrap.innerHTML = '';
  SAMPLES.forEach((s) => {
    const c = document.createElement('canvas');
    const ctx = makeCanvas(c);
    paintBase(ctx, s.base);
    paintText(ctx, {
      text: s.text, x: SIZE / 2, y: SIZE - 70,
      size: s.text.length > 4 ? 52 : 64, color: TEXT_COLORS[0],
    });
    paintWatermark(ctx);
    wrap.appendChild(c);
  });
}

// --- 首页：底图网格 ---
const gridCtxs = [];
function renderGrid() {
  const grid = $('baseGrid');
  grid.innerHTML = '';
  gridCtxs.length = 0;
  BASES.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'cell';
    btn.setAttribute('aria-label', b.name);
    const c = document.createElement('canvas');
    const ctx = makeCanvas(c);
    paintBase(ctx, i);
    btn.appendChild(c);
    btn.addEventListener('click', () => { state.baseIndex = i; enterEdit(); });
    grid.appendChild(btn);
    gridCtxs.push({ ctx, i });
  });
}

// 图片异步加载完成后刷新所有已画内容
function refreshAll() {
  renderSamples();
  gridCtxs.forEach(({ ctx, i }) => { ctx.clearRect(0, 0, SIZE, SIZE); paintBase(ctx, i); });
  if (screens.edit.classList.contains('active')) compose(editCtx);
}

// --- 编辑页 ---
const editCanvasEl = $('editCanvas');
const editCtx = makeCanvas(editCanvasEl);

function enterEdit() {
  state.textX = SIZE / 2;
  state.textY = SIZE - 70;
  compose(editCtx);
  show('edit');
}

// 文字输入
$('textInput').addEventListener('input', (e) => {
  state.text = e.target.value;
  compose(editCtx);
});

// 梗按钮
MEME_TEXTS.forEach((t) => {
  const b = document.createElement('button');
  b.type = 'button';
  b.textContent = t;
  b.addEventListener('click', () => {
    state.text = t;
    $('textInput').value = t;
    compose(editCtx);
  });
  $('memeBtns').appendChild(b);
});

// 颜色按钮
TEXT_COLORS.forEach((c, i) => {
  const b = document.createElement('button');
  b.type = 'button';
  b.style.background = c.fill;
  b.setAttribute('aria-label', c.name);
  if (i === 0) b.classList.add('sel');
  b.addEventListener('click', () => {
    state.colorIndex = i;
    document.querySelectorAll('#colorBtns button').forEach((x) => x.classList.remove('sel'));
    b.classList.add('sel');
    compose(editCtx);
  });
  $('colorBtns').appendChild(b);
});

// 字号滑块
$('sizeRange').addEventListener('input', (e) => {
  state.fontSize = +e.target.value;
  compose(editCtx);
});

// --- 文字拖动（touch + mouse 都支持）---
let dragging = false;
function canvasPos(clientX, clientY) {
  const rect = editCanvasEl.getBoundingClientRect();
  return {
    x: (clientX - rect.left) / rect.width * SIZE,
    y: (clientY - rect.top) / rect.height * SIZE,
  };
}
function dragStart(clientX, clientY) {
  const p = canvasPos(clientX, clientY);
  // 手指附近就算抓到文字（宽松命中，方便小屏操作）
  const hitR = Math.max(80, state.fontSize * 1.5);
  if (Math.abs(p.x - state.textX) < SIZE / 2 && Math.abs(p.y - state.textY) < hitR) {
    dragging = true;
  }
}
function dragMove(clientX, clientY) {
  if (!dragging) return;
  const p = canvasPos(clientX, clientY);
  state.textX = Math.min(SIZE - 20, Math.max(20, p.x));
  state.textY = Math.min(SIZE - 20, Math.max(30, p.y));
  compose(editCtx);
}
// touch
editCanvasEl.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  dragStart(t.clientX, t.clientY);
}, { passive: false });
editCanvasEl.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  dragMove(t.clientX, t.clientY);
}, { passive: false });
editCanvasEl.addEventListener('touchend', () => { dragging = false; });
// mouse
editCanvasEl.addEventListener('mousedown', (e) => dragStart(e.clientX, e.clientY));
window.addEventListener('mousemove', (e) => dragMove(e.clientX, e.clientY));
window.addEventListener('mouseup', () => { dragging = false; });

// --- 出图 ---
$('btnDone').addEventListener('click', () => {
  compose(editCtx);
  // 微信内 canvas 无法长按保存，必须转成 img
  $('resultImg').src = editCanvasEl.toDataURL('image/png');
  show('result');
});

// --- 导航 ---
$('btnStart').addEventListener('click', () => enterEdit());
$('btnBack').addEventListener('click', () => show('home'));
$('btnAgain').addEventListener('click', () => show('home'));

// 禁双击缩放误触（iOS 微信兜底）
let lastTouch = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouch < 320 && e.target.closest('#resultImg') === null) {
    e.preventDefault();
  }
  lastTouch = now;
}, { passive: false });

// 初始渲染
renderSamples();
renderGrid();
compose(editCtx);
</script>
</body>
</html>
